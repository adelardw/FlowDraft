# @package _global_
# Task stage 1: reproduce the Orthrus baseline at tractable scale.
# 0.5B backbone, full-sequence recipe: a random fraction of positions is
# masked (barycenter = the simplex-native [MASK]), the head reconstructs
# them under one KL term to the frozen teacher; drafter-only training.
# The inference-geometry retrain is a separate ADDITION preset:
# +experiment=baseline_block_wise.
#   uv run python src/train.py +experiment=baseline
defaults:
  - override /model: qwen2_0.5b

# own dir + filename: runs of different presets never overwrite each other's
# checkpoints (incl. last.ckpt) or TensorBoard logs
output_dir: checkpoints/baseline

train:
  variant: baseline
  checkpoint_name: baseline-{step:07d}
