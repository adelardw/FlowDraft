# @package _global_
# Paper-faithful Orthrus baseline: frozen Qwen3-1.7B AR backbone plus
# trainable Q/K/V diffusion projections. Each packed 2048-token sequence
# contributes 256 independently anchored, 32-token masked blocks.
#   uv run python src/train.py +experiment=baseline
defaults:
  - override /model: qwen3_1.7b

# own dir + filename: runs of different presets never overwrite each other's
# checkpoints (incl. last.ckpt) or TensorBoard logs
output_dir: checkpoints/baseline

train:
  variant: baseline
  block_size: 32
  anchors_per_sequence: 256
  lr: 2e-4
  warmup_ratio: 0.05
  early_stop_patience: 0
  checkpoint_name: baseline-{step:07d}
  # Decode metrics are computed over consecutive validation prompts. 16 is
  # stable enough for checkpoint selection without making validation dominant.
  val_decode_prompts: 16

data:
  splits: [chat, math, code]
  pack_sequences: true
  pad_to_max_length: true
  train_size: 600000
  batch_size: 1
  max_length: 2048

trainer:
  # Paper: 8 devices x local batch 1 x accumulation 16 = global batch 128.
  # On fewer GPUs, increase accumulation to preserve that product.
  max_epochs: 2
  # The packing preflight derives the finite length and cosine horizon from
  # the 600K raw-example corpus; do not cap the packed output by hand.
  max_steps: -1
  accumulate_grad_batches: 16
