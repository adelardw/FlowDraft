# @package _global_
# Task stage 5 ablation: the consistency term ALONE (endpoint anchor off).
# Expectation: self-consistent but unanchored — the diagonal never learns
# categorical endpoints, so generation quality should collapse.
#   uv run python src/train.py +experiment=ablate_consistency_only
defaults:
  - override /model: qwen2_0.5b

output_dir: checkpoints/ablate-consistency

train:
  variant: fixed
  endpoint_weight: 0.0
  checkpoint_name: ablate-consistency-{step:07d}
