# Entrypoint config for src/train.py  →  @hydra.main(config_name="train")
# Compose: `uv run python src/train.py`
# Override:  `uv run python src/train.py model=llama3_3b seed=0`

defaults:
  - model: llama3_3b
  - data: nemotron  # training distribution (см. configs/data/)
  - _self_          # keep last so values below override the groups above

seed: 42
output_dir: checkpoints     # artifacts live at project root, gitignored
# Lightning resume checkpoint. Unlike evaluation's `checkpoint`, this restores
# model, AdamW, scheduler, global step, and callback state.
resume_from_checkpoint: null

# TensorBoard is always written locally. Enable W&B to mirror the same
# Lightning metrics; authenticate with `uv run wandb login` or WANDB_API_KEY.
wandb:
  enabled: false
  project: flowdraft
  entity: null              # W&B team/user; null uses the CLI/env default
  name: null                # run display name; null lets W&B generate one
  group: null               # optional experiment/ablation group
  tags: []
  offline: false            # true writes a local run for a later `wandb sync`

# --- training (OrthrusLitModule.configure_optimizers) ---
train:
  variant: fixed            # TASK variants (full-sequence, per the project task):
                            #   fixed (flow-map drafter, lit_orthrus)
                            #   | baseline (Orthrus masked drafter)
                            # ADDITION beyond the task (the inference geometry):
                            #   block_wise (clean AR prefix in KV + noisy K-block)
                            #   | baseline_block_wise (masked drafter, block-causal)
                            # Presets (see configs/experiment/):
                            #   task stages — `+experiment=baseline|flowmap_staged|ablate_*`
                            #   addition     — `+experiment=baseline_block_wise|flowmap_block_wise`
  block_size: 64            # K — block-wise variants; paper baseline overrides to 32
  anchors_per_sequence: 1   # paper baseline overrides this to 256
  min_prefix: 1             # block-wise only: shortest clean prefix
  lr: 1e-4                  # peak LR (the Orthrus paper uses 2e-4 at global batch 128x2048)
  lr_schedule: cosine       # cosine (linear warmup -> cosine decay to 0, needs a finite
                            #   trainer.max_steps or limit_train_batches+max_epochs) | constant
  warmup_ratio: 0.05        # cosine only: fraction of total steps spent warming up
  weight_decay: 0.01
  betas: [0.9, 0.95]
  time_sampling: paper      # paper: t~U[0,1], s~U[0,t] | triangle (uniform on {s<=t}) | sequential (s~U, t~U[s,1])
  lambda: 1.0               # weight of the ECLD part: loss = endpoint_weight*endpoint + ar_kl_weight*AR_KL + lambda*(4*EC + 2*TD)
  endpoint_weight: 1.0      # categorical VFM diagonal CE; 0 = consistency-only ablation
  ar_kl_weight: 0.0         # optional verifier-alignment auxiliary; 0 keeps the CFM objective paper-faithful
  lambda_ramp_steps: 0      # staged CFM training: ramp lambda 0 -> lambda over N steps
                            #   (diagonal endpoint inference first, consistency second); 0 = static
  checkpoint_name: flowdraft-{step:07d}   # ModelCheckpoint filename pattern
  anchor_point: trajectory  # where endpoint inference evaluates the diagonal pi_{t,t}:
                            #   trajectory --> pi_{t,t}(x_t) | landing (X_{s,t}(x_s)) --> pi_{t,t}(X_{s,t}(x_s))
  checkpoint_every_n_steps: 1000
  # Target-metric validation: run the real decode loop (single-jump) on a few
  # val prompts each validation -> val/tpf & val/acceptance_decode curves.
  val_decode_prompts: 2     # 0 = off; raise (8+) if checkpoint selection looks noisy
  val_decode_max_new: 32
  monitor: val/tpf          # checkpoint selection: val/tpf (beat the baseline on the
  monitor_mode: max         #   target metric; NOISY early) | val/loss + min (smooth)
  early_stop_patience: 5    # stop if val/loss fails to improve N validations in a row; 0 = off

# Lightning Trainer kwargs, passed through verbatim (см. src/train.py)
trainer:
  accelerator: auto
  devices: auto
  strategy: auto             # auto selects DDP when multiple GPU devices are requested
  precision: bf16-mixed
  max_steps: 10000            # -1 = no step bound (then bound by max_epochs)
  max_epochs: null            # repetitions of the stream; see "Повторение потока" in README
  limit_train_batches: null   # batches per repetition; null = the whole stream
  val_check_interval: 500
  log_every_n_steps: 10
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1

# data.* lives in configs/data/ (defaults: nemotron); override fields inline:
#   `uv run python src/train.py data.batch_size=8 data.max_length=1024`
# block_size / jump_count are method knobs (ablated per the slides)
