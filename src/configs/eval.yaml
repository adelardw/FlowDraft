
defaults:
  - model: llama3_3b
  - data: math500   # HELD-OUT bench by default; data=nemotron -> in-distribution eval
  - _self_

seed: 42
checkpoint: null            # path to a FlowMapOrthrus .ckpt (DF head only); null = untrained drafter
results_file: results/eval.jsonl   # every run appends a JSON row; plots: uv run python src/plots.py
variant: fixed              # which drafter the checkpoint was trained as:
                            #   fixed | block_wise (flow-map draft) | baseline (single-step masked)

# metrics: acceptance / TPF / tokens-per-s + speedup vs greedy AR; lossless is asserted
# ablation grids via hydra multirun: `uv run python src/eval.py -m decode.block_size=4,8,16 decode.jumps=1,2,4`
decode:
  block_size: 8
  jumps: 1                  # int (equal jumps) — or a grid like [0, 0.5, 1]
  max_new_tokens: 64
  n_prompts: 64             # acceptance is noisy across prompts: 100-200 for a paper table
  prompt_len: null          # null = the full rendered prompt (honest bench setting);
                            #   int N = first N tokens only (prefix-continuation mode)
  temperature: 0.0          # 0 = greedy (bitwise lossless); >0 = sampling
  top_k: null               # sampling only
  top_p: null               # sampling only
  coupled: true             # temperature>0: true = Gumbel-coupled sampling — BIT-exact vs AR
                            #   (per the brief); false = Leviathan — lossless in distribution
  equiv_samples: 0          # uncoupled sampling only: null-calibrated TV equivalence check
                            #   on the first prompt (e.g. 500 draws); 0 = off

# Prompt source lives in configs/data/. Two levels of held-out:
#   data=math500  (default) — a DIFFERENT dataset never seen in training:
#                 distribution-level held-out, the honest generalization number;
#   data=nemotron            — the training distribution; its val slice is
#                 sample-level held-out (train skips the first val_size of the
#                 same seeded stream) but NOT distribution-level.
# Report both: the gap between them is the drafter's overfit to the train mix.