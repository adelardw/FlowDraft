# Orthrus paper backbone scale.  Qwen3 exposes the same attention projection
# names as Qwen2, so the generic Q/K/V diffusion adapter applies unchanged.
name: Qwen/Qwen3-1.7B

backbone:
  pretrained_model_name_or_path: ${..name}
  revision: main
  dtype: bfloat16
  device_map: auto
  # Dense AR teacher/verifier calls use FlashAttention-4 on H100. The paper
  # baseline's custom sparse DF mask remains routed through FlexAttention's
  # FLASH backend, which also lowers to FA4.
  attn_implementation: flash_attention_4
  low_cpu_mem_usage: true
  trust_remote_code: false
  use_cache: false

tokenizer:
  pretrained_model_name_or_path: ${..name}
  revision: main
  use_fast: true
  padding_side: right
  trust_remote_code: false

adapter:
  # Official Orthrus maintains a separate diffusion attention projection
  # path; only Q/K/V are initialized from their frozen AR counterparts.
  w_names: [q_proj, k_proj, v_proj]
